<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبورد آنالیز هوشمند آسیا</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .price { font-size: 1.5rem; color: #22c55e; font-weight: bold; margin: 10px 0; }
        .garch { color: #f59e0b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h2>تحلیل جامع ۱۲ نماد (GARCH)</h2>
    <p id="time">Melbourne: 04/04/2026, 18:38:30</p>
    
    <div class="grid">
        <div class="card"><h3>Bitcoin</h3><div class="price" id="price-btc">66,950.30</div><div class="garch" id="garch-btc">2.20%</div></div>
        <div class="card"><h3>Ethereum</h3><div class="price" id="price-eth">2,052.77</div><div class="garch" id="garch-eth">2.64%</div></div>
        <div class="card"><h3>Solana</h3><div class="price" id="price-sol">80.25</div><div class="garch" id="garch-sol">2.16%</div></div>
        <div class="card"><h3>Gold</h3><div class="price" id="price-gold">4,651.50</div><div class="garch" id="garch-gold">2.52%</div></div>
        <div class="card"><h3>S&P 500</h3><div class="price" id="price-sp500">6,582.69</div><div class="garch" id="garch-sp500">1.12%</div></div>
        <div class="card"><h3>Nasdaq 100</h3><div class="price" id="price-nsdq100">21,879.18</div><div class="garch" id="garch-nsdq100">1.48%</div></div>
    </div>
</body>
</html>
